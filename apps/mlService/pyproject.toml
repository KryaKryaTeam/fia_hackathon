[tool.coverage.run]
branch = true
source = [ "mlService" ]

[tool.coverage.report]
exclude_lines = ['if TYPE_CHECKING:']
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../coverage/apps/mlService/html'
 --cov-report xml:'../../coverage/apps/mlService/coverage.xml'
 --html='../../reports/apps/mlService/unittests/html/index.html'
 --junitxml='../../reports/apps/mlService/unittests/junit.xml'
"""

[tool.uv.sources]
torch = { index = "pytorch-cpu" }

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"

[project]
name = "mlService"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.11,<3.14"
readme = 'README.md'
dependencies = [
    "google-genai>=2.10.0",
    "psycopg[binary]>=3.3.4",
    "python-dotenv>=1.2.1",
    "redis>=7.0.1",
    "sentence-transformers>=5.6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["mlService"]

[tool.hatch.metadata]
allow-direct-references = true

[dependency-groups]
dev = [
  "autopep8>=2.3.1",
  "ruff>=0.8.2",
  "pytest>=8.3.4",
  "pytest-sugar>=1.0.0",
  "pytest-cov>=6.0.0",
  "pytest-html>=4.1.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
exclude = [
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  "dist",
]

line-length = 88
indent-width = 4

[tool.ruff.lint]
select = [
  # pycodestyle
  "E",
  # Pyflakes
  "F",
  # pyupgrade
  "UP",
  # flake8-bugbear
  "B",
  # flake8-simplify
  "SIM",
  # isort
  "I",
]
ignore = []

fixable = ["ALL"]
unfixable = []
